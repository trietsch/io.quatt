<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
:root{--text:#101217;--muted:rgba(16,18,23,.58);--cool:#68dcff;--cool-soft:#ddf8ff;--heat:#ff9b4a;--heat-soft:#fff0dc;--off:#a9b0bb;--off-soft:#eef0f3;--accent:var(--cool);--accent-soft:var(--cool-soft)}*{margin:0;padding:0;-webkit-tap-highlight-color:transparent}html,body{width:100%;height:100%;overflow:hidden}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:transparent;color:var(--text)}button{font:inherit;color:inherit;border:0;cursor:pointer}.card{--accent:var(--cool);--accent-soft:var(--cool-soft);--accent-rgb:104,220,255;--text:#fff;--muted:rgba(255,255,255,.68);position:relative;width:100%;height:100%;min-height:220px;overflow:hidden;border-radius:2px;padding:18px;background:#12151d;color:var(--text);isolation:isolate;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}.card:before{
  content:"";
  position:absolute;
  inset:-40px;
  z-index:0;
  background:url('./assets/Room.png') center/cover no-repeat;
  filter:blur(4px) saturate(1);
  transform:scale(1.12);
  opacity:1;
}.card:after{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;background:radial-gradient(circle at 82% 72%,rgba(var(--accent-rgb),.22),transparent 24%),linear-gradient(90deg,rgba(5,7,12,.10) 0%,rgba(5,7,12,.04) 48%,rgba(5,7,12,.12) 100%),linear-gradient(180deg,rgba(255,255,255,.03) 0%,rgba(0,0,0,.08) 100%)}.card.heating{--accent:var(--heat);--accent-soft:var(--heat-soft);--accent-rgb:255,155,74}.card.off{--accent:var(--off);--accent-soft:var(--off-soft);--accent-rgb:169,176,187}
.top{position:relative;z-index:20;display:flex;align-items:center;justify-content:flex-start}.power{width:50px;height:30px;padding:4px;border-radius:999px;background:rgba(255,255,255,.18);box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}.power:after{content:"";display:block;width:22px;height:22px;border-radius:50%;background:white;box-shadow:0 3px 10px rgba(0,0,0,.22);transform:translateX(0);transition:transform .25s ease}.active .power{background:#4b82ff}.active .power:after{transform:translateX(20px)}.power:disabled,.ctrl-btn:disabled,.chip-btn:disabled,.option:disabled{opacity:.55;cursor:not-allowed}.inactive-controls{opacity:.28;pointer-events:none;filter:saturate(.55)}.inactive-controls .target-control,.inactive-chips .chip-btn{box-shadow:none;background:rgba(255,255,255,.10)}.inactive-chips{opacity:.28;pointer-events:none;filter:saturate(.55)}
.content{position:relative;z-index:8;max-width:55%;margin-top:22px}.title{font-size:clamp(27px,8.6vw,38px);line-height:.98;font-weight:950;letter-spacing:-.06em;margin-bottom:22px}.temperature{font-size:clamp(48px,14vw,66px);line-height:.86;font-weight:950;letter-spacing:-.085em}.temperature .unit{font-size:.40em;letter-spacing:-.04em;margin-left:2px}.controls{position:relative;z-index:18;max-width:52%;margin-top:14px;display:flex;flex-direction:column;gap:7px}.target-control{width:min(100%,210px);display:flex;align-items:center;justify-content:space-between;gap:7px;padding:6px;border-radius:999px;background:rgba(20,22,28,.48);box-shadow:0 12px 30px rgba(0,0,0,.20),inset 0 0 0 1px rgba(255,255,255,.13);backdrop-filter:blur(14px)}.ctrl-btn{width:34px;height:34px;border-radius:999px;background:rgba(255,255,255,.13);color:#fff;font-size:25px;font-weight:950;line-height:1;box-shadow:0 5px 14px rgba(0,0,0,.18),inset 0 0 0 1px rgba(255,255,255,.10)}.target-value{min-width:66px;text-align:center;font-size:19px;font-weight:950;color:rgba(255,255,255,.92)}.control-label{margin-left:7px;color:var(--muted);font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.05em}
.chips{position:absolute;z-index:22;right:16px;bottom:16px;display:flex;flex-direction:row;gap:8px;align-items:center;justify-content:flex-end}.chip-btn{width:42px;height:42px;min-width:42px;display:flex;align-items:center;justify-content:center;padding:0;border-radius:999px;background:rgba(20,22,28,.48);color:#fff;font-size:0;box-shadow:0 12px 28px rgba(0,0,0,.22),inset 0 0 0 1px rgba(255,255,255,.14);backdrop-filter:blur(14px);transition:transform .16s ease,background .16s ease}.chip-btn:active{transform:scale(.94)}.chip-btn.mode-chip{background:rgba(20,22,28,.52);color:var(--accent)}.chip-btn.mode-chip.off-chip{background:rgba(255,255,255,.09);color:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.10)}.chip-btn .icon{font-size:20px;line-height:1}.chip-btn .arrow{display:none}.chip-btn.fan-chip{background:rgba(20,22,28,.52);color:#65a2ff}
.popup{position:absolute;z-index:40;right:15px;bottom:66px;width:150px;padding:9px;border-radius:18px;background:rgba(255,255,255,.94);box-shadow:0 18px 42px rgba(0,0,0,.22);backdrop-filter:blur(14px);display:none}.popup.show{display:block}.popup:before{content:"";position:absolute;right:28px;top:100%;border-left:10px solid transparent;border-right:10px solid transparent;border-top:12px solid rgba(255,255,255,.94)}.popup.fan-popup{right:15px}.popup-title{font-size:12px;font-weight:850;color:rgba(0,0,0,.70);margin:3px 6px 7px}.option{width:100%;height:34px;display:flex;align-items:center;gap:8px;padding:0 8px;border-radius:11px;background:transparent;color:#1f242b;font-size:13px;font-weight:650;text-align:left}.option.selected{background:#e4f4ff;color:#1676d2;font-weight:800}.option .check{margin-left:auto;font-size:15px}.product-wrap{position:absolute;z-index:5;right:-4px;bottom:-18px;width:48%;height:78%;pointer-events:none}.product-glow{position:absolute;left:12%;right:7%;bottom:10%;height:26%;border-radius:999px;background:var(--accent);opacity:.28;filter:blur(18px);transform:scaleX(1.05)}.active .product-glow{animation:pulseGlow 2.2s ease-in-out infinite}@keyframes pulseGlow{0%,100%{opacity:.22;transform:scaleX(.95)}50%{opacity:.43;transform:scaleX(1.18)}}.ring{position:absolute;left:14%;right:14%;bottom:14%;height:22%;border:2px solid var(--accent);border-radius:999px;opacity:.20;transform:perspective(180px) rotateX(64deg)}.active .ring{animation:ringPulse 2.4s ease-out infinite}@keyframes ringPulse{0%{transform:perspective(180px) rotateX(64deg) scale(.72);opacity:.30}100%{transform:perspective(180px) rotateX(64deg) scale(1.35);opacity:0}}.product{position:absolute;right:0;bottom:13%;width:95%;height:auto;filter:drop-shadow(0 24px 24px rgba(0,0,0,.40));transform-origin:50% 80%}
.air{position:absolute;z-index:3;right:32%;bottom:29%;width:42%;height:31%;pointer-events:none;opacity:0}.active .air{opacity:.95}.stream{position:absolute;right:0;height:3px;border-radius:999px;background:linear-gradient(90deg,transparent,var(--accent),transparent);filter:blur(.15px);animation:airflow var(--air-speed,2.2s) linear infinite}.stream.s1{top:10px;width:90%;animation-delay:0s}.stream.s2{top:33px;width:75%;animation-delay:-.65s}.stream.s3{top:56px;width:98%;animation-delay:-1.25s}.fan-low .stream.s2,.fan-low .stream.s3{display:none}.fan-normal .stream.s3{opacity:.58}.fan-high{--air-speed:1.45s}.off .stream{animation:none;opacity:.1}@keyframes airflow{from{transform:translateX(45px);opacity:0}18%{opacity:1}76%{opacity:1}to{transform:translateX(-78px);opacity:0}}.error{height:100%;display:grid;place-items:center;padding:20px;text-align:center;color:rgba(255,255,255,.72);font-weight:700}.busy:after{content:"";position:absolute;inset:0;z-index:30;background:rgba(255,255,255,.12);pointer-events:none}@media(max-width:320px){.chips{right:12px;bottom:12px;gap:6px}.chip-btn{width:38px;height:38px;min-width:38px}.chip-btn .icon{font-size:18px}.popup{right:10px;bottom:58px;width:136px}.content{max-width:52%}.controls{max-width:52%}.title{font-size:26px}}
</style>
</head>
<body><div id="content" class="card"><div class="error">Laden...</div></div>
<script>
function onHomeyReady(Homey){
 const el=document.getElementById('content');const ids=Homey.getDeviceIds&&Homey.getDeviceIds();const id=ids&&ids[0];Homey.ready({height:240});
 const lang=(navigator.language||'nl').substring(0,2);const nl=lang==='nl';
 const text={target:'',mode:nl?'Modus':'Mode',cool:nl?'Koelen':'Cooling',heat:nl?'Verwarmen':'Heating',off:nl?'Uit':'Off',fan:nl?'Ventilatorsnelheid':'Fan speed',fanLow:nl?'Laag':'Low',fanNormal:nl?'Normaal':'Normal',fanHigh:nl?'Hoog':'High'};
 let state=null,busy=false,pendingTargetTemp=null,pendingTargetUntil=0,openPopup=null;
 const fmt=(v,d=1)=>v===null||v===undefined||Number.isNaN(Number(v))?'--':Number(v).toFixed(d);
 function normMode(v){v=String(v||'').toUpperCase();return v.includes('HEAT')?'heating':v.includes('COOL')?'cooling':'off'}
 function normFan(v){v=String(v||'').toLowerCase();if(v.includes('high')||v.includes('hoog'))return'high';if(v.includes('low')||v.includes('laag'))return'low';return'normal'}
 function modeLabel(m){return m==='heating'?text.heat:m==='cooling'?text.cool:text.off}
 function fanLabel(f){return f==='high'?text.fanHigh:f==='low'?text.fanLow:text.fanNormal}
 function modeIcon(m){return m==='heating'?'☼':m==='cooling'?'❄':'⏻'}
 async function call(method,path,body,opts){if(!id)return;busy=true;render(state);try{await Homey.api(method,path,body||{});if(!opts||!opts.keepLocal){await draw(true)}}catch(e){Homey.alert&&Homey.alert(e.message||String(e));if(!opts||!opts.keepLocal){await draw(true)}}finally{busy=false;render(state)}}
 function render(d){
  if(!d){el.className='card off';el.innerHTML='<div class="error">Laden...</div>';return}
  const active=!!d.isOn;const mode=active?normMode(d.mode):'off';const fan=normFan(d.fanMode);const controlsDisabled=!active||busy;if(!active)openPopup=null;
  el.className=`card ${mode} ${active?'active':''} fan-${fan} ${busy?'busy':''}`;
  el.innerHTML=`<div class="top"><button class="power" ${busy?'disabled':''} aria-label="Power"></button></div>
  <section class="content"><h1 class="title">${d.name||'Quatt Chill'}</h1><div class="temperature"><span>${fmt(d.roomTemp)}</span><span class="unit">°C</span></div></section>
  <section class="controls ${!active?'inactive-controls':''}"><div class="target-control"><button class="ctrl-btn minus" ${controlsDisabled?'disabled':''}>−</button><div class="target-value">${fmt(d.targetTemp,0)}°</div><button class="ctrl-btn plus" ${controlsDisabled?'disabled':''}>+</button></div><div class="control-label">${text.target}</div></section>
  <div class="chips ${!active?'inactive-chips':''}"><button class="chip-btn mode-chip ${mode==='off'?'off-chip':''}" title="${modeLabel(mode)}" aria-label="${text.mode}: ${modeLabel(mode)}" ${controlsDisabled?'disabled':''}><span class="icon">${modeIcon(mode)}</span><span class="arrow">›</span></button><button class="chip-btn fan-chip" title="${fanLabel(fan)}" aria-label="${text.fan}: ${fanLabel(fan)}" ${controlsDisabled?'disabled':''}><span class="icon">✤</span><span class="arrow">›</span></button></div>
  <div class="popup mode-popup ${openPopup==='mode'?'show':''}"><div class="popup-title">${text.mode}</div>${['cooling','heating','off'].map(m=>`<button class="option mode-option ${m===mode?'selected':''}" data-mode="${m}" ${busy?'disabled':''}><span>${modeIcon(m)}</span><span>${modeLabel(m)}</span>${m===mode?'<span class="check">✓</span>':''}</button>`).join('')}</div>
  <div class="popup fan-popup ${openPopup==='fan'?'show':''}"><div class="popup-title">${text.fan}</div>${['low','normal','high'].map(f=>`<button class="option fan-option ${f===fan?'selected':''}" data-fan="${f}" ${busy?'disabled':''}><span>✤</span><span>${fanLabel(f)}</span>${f===fan?'<span class="check">✓</span>':''}</button>`).join('')}</div>
  <div class="air"><div class="stream s1"></div><div class="stream s2"></div><div class="stream s3"></div></div><div class="product-wrap"><div class="product-glow"></div><div class="ring"></div><img class="product" src="./assets/chill.png" alt=""></div>`;
  el.querySelector('.power')?.addEventListener('click',()=>{state={...state,isOn:!active};openPopup=null;render(state);call('POST',`/${encodeURIComponent(id)}/onoff`,{on:!active})});
  el.querySelector('.minus')?.addEventListener('click',()=>{const next=Math.round(Number(state?.targetTemp??d.targetTemp??0)-1);pendingTargetTemp=next;pendingTargetUntil=Date.now()+45000;state={...state,targetTemp:next};openPopup=null;render(state);call('POST',`/${encodeURIComponent(id)}/target-temperature`,{targetTemperature:next,value:next,mode:mode},{keepLocal:true})});
  el.querySelector('.plus')?.addEventListener('click',()=>{const next=Math.round(Number(state?.targetTemp??d.targetTemp??0)+1);pendingTargetTemp=next;pendingTargetUntil=Date.now()+45000;state={...state,targetTemp:next};openPopup=null;render(state);call('POST',`/${encodeURIComponent(id)}/target-temperature`,{targetTemperature:next,value:next,mode:mode},{keepLocal:true})});
  el.querySelector('.mode-chip')?.addEventListener('click',()=>{openPopup=openPopup==='mode'?null:'mode';render(state)});
  el.querySelector('.fan-chip')?.addEventListener('click',()=>{openPopup=openPopup==='fan'?null:'fan';render(state)});
  el.querySelectorAll('.mode-option').forEach(b=>b.addEventListener('click',()=>{const next=b.getAttribute('data-mode');openPopup=null;state={...state,mode:next,isOn:next!=='off'};render(state);call('POST',`/${encodeURIComponent(id)}/mode`,{mode:next})}));
  el.querySelectorAll('.fan-option').forEach(b=>b.addEventListener('click',()=>{const next=b.getAttribute('data-fan');openPopup=null;state={...state,fanMode:next};render(state);call('POST',`/${encodeURIComponent(id)}/fan-mode`,{fanMode:next})}));
 }
 async function draw(force){try{if(!id)throw new Error(nl?'Geen Chill geselecteerd':'No Chill selected');state=await Homey.api('GET',`/${encodeURIComponent(id)}`);if(pendingTargetTemp!==null&&Date.now()<pendingTargetUntil){state.targetTemp=pendingTargetTemp}else{pendingTargetTemp=null}render(state)}catch(e){el.className='card off';el.innerHTML=`<div class="error">${e.message}</div>`}}
 draw();setInterval(()=>{if(!busy&&!openPopup)draw()},10000);
}
</script></body></html>
